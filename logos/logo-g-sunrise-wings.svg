<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Logo G: Sunrise Wings — Sunrise over Africa horizon with bee-wing shapes framing it -->

  <!-- Background -->
  <rect width="400" height="400" fill="#fafaf7" rx="12"/>

  <!-- Subtle honeycomb bg -->
  <g opacity="0.04" stroke="#1a6b6a" stroke-width="0.8" fill="none">
    <polygon points="200,20 218,30 218,50 200,60 182,50 182,30"/>
    <polygon points="236,30 254,40 254,60 236,70 218,60 218,40"/>
    <polygon points="164,30 182,40 182,60 164,70 146,60 146,40"/>
    <polygon points="200,60 218,70 218,90 200,100 182,90 182,70"/>
  </g>

  <!-- Sunrise half-circle -->
  <path d="M 120 220 A 80 80 0 0 1 280 220" fill="#d4a843" opacity="0.2"/>
  <path d="M 140 220 A 60 60 0 0 1 260 220" fill="#d4a843" opacity="0.15"/>

  <!-- Sun rays -->
  <line x1="200" y1="130" x2="200" y2="110" stroke="#d4a843" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
  <line x1="230" y1="138" x2="245" y2="122" stroke="#d4a843" stroke-width="2" opacity="0.35" stroke-linecap="round"/>
  <line x1="170" y1="138" x2="155" y2="122" stroke="#d4a843" stroke-width="2" opacity="0.35" stroke-linecap="round"/>
  <line x1="252" y1="158" x2="272" y2="150" stroke="#d4a843" stroke-width="2" opacity="0.3" stroke-linecap="round"/>
  <line x1="148" y1="158" x2="128" y2="150" stroke="#d4a843" stroke-width="2" opacity="0.3" stroke-linecap="round"/>

  <!-- Wing shapes (left) — stylized bee wing -->
  <path d="M 195 200 Q 120 170 80 200 Q 120 195 195 210 Z" fill="#1a6b6a" opacity="0.1"/>
  <path d="M 195 200 Q 120 170 80 200 Q 120 195 195 210" fill="none" stroke="#1a6b6a" stroke-width="1.5" opacity="0.4"/>

  <!-- Wing shapes (right) -->
  <path d="M 205 200 Q 280 170 320 200 Q 280 195 205 210 Z" fill="#1a6b6a" opacity="0.1"/>
  <path d="M 205 200 Q 280 170 320 200 Q 280 195 205 210" fill="none" stroke="#1a6b6a" stroke-width="1.5" opacity="0.4"/>

  <!-- Central school building silhouette -->
  <rect x="183" y="195" width="34" height="28" fill="#1a6b6a" rx="1"/>
  <polygon points="175,197 200,175 225,197" fill="#1a6b6a"/>
  <!-- Door -->
  <rect x="194" y="210" width="12" height="13" fill="#fafaf7" rx="6 6 0 0"/>
  <!-- Windows -->
  <rect x="187" y="202" width="7" height="6" fill="#fafaf7" rx="1"/>
  <rect x="206" y="202" width="7" height="6" fill="#fafaf7" rx="1"/>
  <!-- Flag -->
  <line x1="200" y1="175" x2="200" y2="162" stroke="#1a6b6a" stroke-width="1.5"/>
  <path d="M 200 162 L 210 166 L 200 170" fill="#d4a843"/>

  <!-- Horizon line -->
  <line x1="70" y1="223" x2="330" y2="223" stroke="#1a6b6a" stroke-width="2" opacity="0.3"/>

  <!-- Small children silhouettes -->
  <g fill="#1a6b6a" opacity="0.25">
    <!-- Child 1 -->
    <circle cx="140" cy="215" r="4"/>
    <line x1="140" y1="219" x2="140" y2="223" stroke="#1a6b6a" stroke-width="2.5"/>
    <!-- Child 2 -->
    <circle cx="152" cy="213" r="4.5"/>
    <line x1="152" y1="218" x2="152" y2="223" stroke="#1a6b6a" stroke-width="2.5"/>
    <!-- Child 3 -->
    <circle cx="248" cy="214" r="4"/>
    <line x1="248" y1="218" x2="248" y2="223" stroke="#1a6b6a" stroke-width="2.5"/>
    <!-- Child 4 -->
    <circle cx="262" cy="215" r="4.5"/>
    <line x1="262" y1="220" x2="262" y2="223" stroke="#1a6b6a" stroke-width="2.5"/>
  </g>

  <!-- VINIR text -->
  <text x="200" y="270" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="700" fill="#1a6b6a" letter-spacing="10">VINIR</text>

  <!-- LITTLE BEES text -->
  <text x="200" y="305" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="700" fill="#d4a843" letter-spacing="5">LITTLE BEES</text>

  <!-- Subtitle -->
  <text x="200" y="332" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#4a6b6a" letter-spacing="2">Supporting children's education in Nairobi</text>

  <!-- Small bee accent bottom -->
  <ellipse cx="200" cy="355" rx="8" ry="5" fill="#d4a843" opacity="0.5"/>
  <circle cx="200" cy="349" r="3.5" fill="#1a6b6a" opacity="0.4"/>
</svg>
