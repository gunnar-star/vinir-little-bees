<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <pattern id="honeycombA" patternUnits="userSpaceOnUse" width="20" height="17.32" patternTransform="scale(1.5)">
      <polygon points="10,0 20,5 20,12.32 10,17.32 0,12.32 0,5" fill="none" stroke="#1a6b6a" stroke-width="0.3" opacity="0.08"/>
    </pattern>
  </defs>
  <!-- Background -->
  <circle cx="200" cy="200" r="195" fill="#fafaf7"/>
  <circle cx="200" cy="200" r="195" fill="url(#honeycombA)"/>
  <!-- Outer ring -->
  <circle cx="200" cy="200" r="185" fill="none" stroke="#1a6b6a" stroke-width="4"/>
  <circle cx="200" cy="200" r="175" fill="none" stroke="#1a6b6a" stroke-width="1.5"/>
  <!-- Sunrise arc -->
  <path d="M 120 230 Q 200 160 280 230" fill="none" stroke="#d4a843" stroke-width="2" opacity="0.4"/>
  <line x1="185" y1="185" x2="175" y2="160" stroke="#d4a843" stroke-width="1.5" opacity="0.3"/>
  <line x1="200" y1="180" x2="200" y2="152" stroke="#d4a843" stroke-width="1.5" opacity="0.3"/>
  <line x1="215" y1="185" x2="225" y2="160" stroke="#d4a843" stroke-width="1.5" opacity="0.3"/>
  <!-- Book forming roof -->
  <path d="M 155 240 L 200 195 L 245 240" fill="none" stroke="#1a6b6a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Book pages -->
  <path d="M 155 240 Q 178 225 200 240" fill="none" stroke="#1a6b6a" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 200 240 Q 222 225 245 240" fill="none" stroke="#1a6b6a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Book spine -->
  <line x1="200" y1="195" x2="200" y2="245" stroke="#1a6b6a" stroke-width="2"/>
  <!-- Small heart -->
  <path d="M 200 178 C 195 170 183 170 183 180 C 183 190 200 198 200 198 C 200 198 217 190 217 180 C 217 170 205 170 200 178 Z" fill="#d4a843" opacity="0.7"/>
  <!-- VINIR text arc -->
  <path id="topArcA" d="M 85 200 A 115 115 0 0 1 315 200" fill="none"/>
  <text font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#1a6b6a" letter-spacing="8">
    <textPath href="#topArcA" startOffset="50%" text-anchor="middle">VINIR</textPath>
  </text>
  <!-- LITTLE BEES text -->
  <text x="200" y="280" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="700" fill="#d4a843" letter-spacing="4">LITTLE BEES</text>
  <!-- Subtitle arc -->
  <path id="bottomArcA" d="M 80 210 A 130 130 0 0 0 320 210" fill="none"/>
  <text font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#4a6b6a" letter-spacing="1">
    <textPath href="#bottomArcA" startOffset="50%" text-anchor="middle">The Friends of Little Bees</textPath>
  </text>
  <!-- Small dots as separators -->
  <circle cx="100" cy="200" r="3" fill="#1a6b6a"/>
  <circle cx="300" cy="200" r="3" fill="#1a6b6a"/>
</svg>
